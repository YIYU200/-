<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专属入口 | 致父亲</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #2c3e50, #34495e);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 0.6s ease-in-out;
}
.page-leave {
  opacity: 0 !important;
}
.login-card {
  background: rgba(255,255,255,0.1);
  padding: 40px 30px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  max-width: 400px;
  width: 100%;
  color: #fff;
}
.login-card h2 {
  margin-bottom: 10px;
  font-size: 24px;
}
.desc {
  color: #ccc;
  margin-bottom: 30px;
  font-size: 14px;
}
#pwdInput {
  width: 100%;
  padding: 14px 16px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
  margin-bottom: 16px;
}
#submitBtn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background-color: #f39c12;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
#submitBtn:hover {
  background-color: #e67e22;
}
.tip {
  margin-top: 12px;
  font-size: 14px;
  min-height: 20px;
}
.error { color: #ff6b6b; }
.success { color: #2ecc71; }
.warn { color: #ffc107; }
</style>
</head>
<body id="bodyBox">
<div class="login-card">
  <h2>🔒 专属入口</h2>
  <p class="desc">请输入专属密码，打开给爸爸的祝福</p>
  <input type="password" id="pwdInput" placeholder="请输入密码">
  <button id="submitBtn">进入祝福页面</button>
  <div class="tip" id="tipText"></div>
</div>

<script>
const RIGHT_PASSWORD = "2";
let errorCount = 0; // 错误计数器，初始0
const MAX_ERROR = 1; // 最多错误5次

const bodyBox = document.getElementById('bodyBox');
const pwdInput = document.getElementById('pwdInput');
const submitBtn = document.getElementById('submitBtn');
const tipText = document.getElementById('tipText');

submitBtn.addEventListener('click', checkPwd);
pwdInput.addEventListener('keydown', e => e.key === 'Enter' && checkPwd());

function checkPwd() {
  const val = pwdInput.value.trim();
  if (!val) {
    tipText.className = "tip error";
    tipText.innerText = "请输入密码";
    return;
  }

  if (val === RIGHT_PASSWORD) {
    // 密码正确，重置错误次数，跳转祝福页
    errorCount = 0;
    tipText.className = "tip success";
    tipText.innerText = "密码正确，正在跳转...";
    bodyBox.classList.add('page-leave');
    setTimeout(() => {
      location.assign("zhufu.html");
    }, 600);
  } else {
    // 密码错误，计数+1
    errorCount++;
    const remain = MAX_ERROR - errorCount;

    if (errorCount >= MAX_ERROR) {
      tipText.className = "tip warn";
      tipText.innerText = "错误次数已达上限，即将跳转";
      bodyBox.classList.add('page-leave');
      setTimeout(() => {
        location.assign("on.html");
      }, 600);
    } else {
      tipText.className = "tip error";
      tipText.innerText = `密码错误，还剩余 ${remain} 次机会`;
      pwdInput.value = "";
    }
  }
}
</script>
</body>
</html>
